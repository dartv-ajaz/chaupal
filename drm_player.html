    <script>
        // --- JW PLAYER LOGIC ---
        function playInJW() {
            const mpd = document.getElementById("mpdUrl").value;
            const lic = document.getElementById("licenseUrl").value;
            const token = document.getElementById("authToken").value;

            jwplayer("jw-player-container").setup({
                file: mpd,
                drm: {
                    widevine: {
                        url: lic,
                        headers: [
                            { name: "authorization", value: token },
                            { name: "Content-Type", value: "application/octet-stream" } // Standard DRM format
                        ]
                    }
                },
                width: "100%",
                aspectratio: "16:9",
                autostart: true,
                cast: {} // Enables Chromecast
            });
        }

        // --- SHAKA PLAYER LOGIC ---
        // Initialize Shaka library on page load
        document.addEventListener('DOMContentLoaded', initShakaApp);
        let shakaPlayerInstance = null;

        function initShakaApp() {
            shaka.polyfill.installAll();
            if (shaka.Player.isBrowserSupported()) {
                const videoElement = document.getElementById('shaka-video-element');
                shakaPlayerInstance = new shaka.Player(videoElement);
                
                shakaPlayerInstance.addEventListener('error', function(event) {
                    console.error('Shaka Error:', event.detail);
                    alert("Shaka Error: Check Console for details.");
                });
            } else {
                console.error('Browser not supported for Shaka Player!');
            }
        }

        async function playInShaka() {
            if (!shakaPlayerInstance) return;

            const mpd = document.getElementById("mpdUrl").value;
            const lic = document.getElementById("licenseUrl").value;
            const token = document.getElementById("authToken").value;

            // Step 1: Configure Widevine DRM Server
            shakaPlayerInstance.configure({
                drm: {
                    servers: {
                        'com.widevine.alpha': lic
                    }
                }
            });

            // Step 2: Intercept the License Request and Inject the Auth Token
            // Yeh wahi kaam karta hai jo Python requests mein headers pass karna hota hai
            shakaPlayerInstance.getNetworkingEngine().clearAllRequestFilters(); // Clear previous
            shakaPlayerInstance.getNetworkingEngine().registerRequestFilter(function(type, request) {
                if (type == shaka.net.NetworkingEngine.RequestType.LICENSE) {
                    request.headers['authorization'] = token;
                }
            });

            // Step 3: Load the MPD file
            try {
                await shakaPlayerInstance.load(mpd);
                console.log('Shaka Player: Video loaded successfully!');
            } catch (e) {
                console.error('Shaka Player Error loading video:', e);
                alert("Failed to load in Shaka. See console.");
            }
        }

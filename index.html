<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium OTT Web Player | Pro Master Hub</title>
    
    <script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>
    <script type="text/javascript">
        jwplayer.key = 'Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==';
    </script>

    <style>
        :root { --bg: #0f1115; --panel: #1a1d24; --border: #2d3139; --accent: #e50914; --text: #fff; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation;}
        
        /* Sidebar */
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; min-height: 0; overflow: hidden; }
        .sidebar-header { padding: 10px 15px 0 15px; background: #111; text-align: center; flex: none; }
        .sidebar-header h2 { margin: 0 0 10px 0; color: var(--accent); font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Tabs */
        .tab-container { display: flex; border-bottom: 1px solid var(--border); background: #111; }
        .tab-btn { flex: 1; padding: 10px; background: transparent; color: #888; border: none; border-bottom: 2px solid transparent; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; font-size: 11px; }
        .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Controls Area */
        .controls { padding: 10px 15px; border-bottom: 1px solid var(--border); background: #15181e; flex: none; overflow-y: auto; max-height: 40vh;}
        .controls button { width: 100%; padding: 8px; margin-bottom: 5px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; font-size: 11px;}
        .controls button:hover { background: #b20710; }
        .custom-input { width: 100%; padding: 6px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; font-size: 12px; box-sizing: border-box; margin-bottom: 5px;}
        .custom-input:focus { outline: none; border-color: var(--accent); }
        .bulk-textarea { resize: none; height: 60px; font-family: monospace; }

        .tab-content-wrapper { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

        /* Scroll Area */
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
        
        /* Folder Styling */
        .folder-item-wrapper { display: flex; align-items: center; margin-bottom: 8px; background: #232730; border-radius: 8px; border-left: 4px solid #f39c12; transition: 0.2s; }
        .folder-item-wrapper:hover { background: #2d3139; }
        .folder-item { flex: 1; padding: 12px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 13px;}
        .folder-count { background: #111; padding: 3px 6px; border-radius: 10px; font-size: 10px; color: #aaa; }
        .delete-btn { background: transparent !important; color: #e74c3c !important; width: auto !important; padding: 10px 12px !important; margin: 0 !important; font-size: 14px; border-left: 1px solid #333 !important; border-radius: 0 8px 8px 0 !important; cursor: pointer; }

        /* Movie/Item Styling */
        .movie-item { display: flex; align-items: center; padding: 8px; margin-bottom: 6px; background: #232730; border-radius: 8px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .movie-item:hover, .movie-item.active { background: #2d3139; border-left: 4px solid var(--accent); }
        .movie-icon { width: 35px; height: 35px; border-radius: 5px; margin-right: 12px; object-fit: contain; background: #000; }
        .movie-info { flex: 1; overflow: hidden; }
        .movie-title { font-size: 13px; font-weight: bold; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-group { font-size: 10px; color: #aaa; background: #333; padding: 2px 6px; border-radius: 4px; display: inline-block; }

        /* API Results */
        .api-result-card { background: #232730; border-radius: 8px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #3498db; display: flex; flex-direction: column; gap: 6px; }
        .api-result-title { font-weight: bold; font-size: 13px; color: #3498db; }
        .api-result-desc { font-size: 11px; color: #ddd; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }

        /* Main Content & Player */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; min-height: 0; }
        .player-wrapper { width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; min-height: 0; position: relative; background: #000;}
        
        #jw-player-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        #player-empty-state { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; color: #444; font-size: 16px; z-index: 5; }

        .gesture-osd { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 15px 25px; border-radius: 10px; font-size: 20px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 99; text-align: center; }

        .now-playing-bar { padding: 10px 15px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 10; flex: none; }
        .now-playing-bar h3 { margin: 0; font-size: 16px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .now-playing-bar p { margin: 3px 0 0 0; color: #aaa; font-size: 11px; }

        /* 📱 MOBILE RESPONSIVE LAYOUT */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .main-content { flex: 0 0 35vh; order: 1; border-bottom: 1px solid var(--border); }
            .sidebar { width: 100%; flex: 1; order: 2; border-right: none; display: flex; flex-direction: column; min-height: 0; }
            .sidebar-header { padding: 10px 10px 0 10px; }
            .sidebar-header h2 { font-size: 16px; margin-bottom: 8px; }
            .controls { max-height: 30vh; padding: 8px 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🍿 Premium VOD Hub</h2>
            <div class="tab-container">
                <button class="tab-btn active" onclick="switchTab('library')">My Library</button>
                <button class="tab-btn" onclick="switchTab('api')">API Hub</button>
            </div>
        </div>
        
        <div id="tab-library" class="tab-content-wrapper" style="display: flex;">
            <div class="controls" id="library-controls">
                <button onclick="fetchM3UFromServer()">🌐 Load Local Server Playlist</button>
                
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input type="text" id="remotePlaylistUrl" class="custom-input" placeholder="Paste URL (m3u/json/php)..." style="margin: 0;">
                    <button onclick="fetchRemotePlaylist()" style="margin: 0; width: auto; padding: 6px 12px; background: #8e44ad;">Fetch</button>
                </div>

                <button onclick="document.getElementById('m3uFile').click()" style="background: #34495e;">📁 Upload Files (.json/.m3u)</button>
                <input type="file" id="m3uFile" accept=".m3u,.m3u8,.txt,.json" onchange="handleMultiFileUpload(event)" multiple style="display:none;">

                <textarea id="bulkLinksInput" class="custom-input bulk-textarea" placeholder="Paste Direct Link, Bulk URLs, or raw M3U text here..."></textarea>
                <button onclick="processBulkLinks()" style="background: #e67e22;">📥 Process Text / Links</button>
                
                <input type="text" id="searchInput" class="custom-input" placeholder="🔍 Search in playlist..." onkeyup="filterPlaylist()" style="display:none; margin-top:5px;">
                <div id="backBtnDiv" style="display:none; margin-top:5px;">
                    <button onclick="showFolderList()" style="background: #95a5a6; padding: 6px;">🔙 Back to Playlists</button>
                </div>
            </div>

            <div class="scroll-area" id="folderList">
                <p style="text-align: center; color: #666; margin-top: 20px;">Upload playlists or fetch URLs to start.</p>
            </div>
            <div class="scroll-area" id="movieList" style="display: none;"></div>
        </div>

        <div id="tab-api" class="tab-content-wrapper" style="display: none;">
            <div class="controls">
                <input type="password" id="apiKey" class="custom-input" placeholder="RapidAPI Key" value="b85ab79191msh6ea8e49ca7a3f72p102e58jsn18b0685108fb">
                <select id="apiService" class="custom-input" onchange="updateApiPlaceholder()">
                    <option value="streaming-movie">Streaming Availability (Movie)</option>
                    <option value="netflix-search">Netflix Search API</option>
                    <option value="rt-spoilers">Rotten Tomatoes Spoilers</option>
                    <option value="imdb-actor">IMDb Actor Credits</option>
                </select>
                <input type="text" id="apiId" class="custom-input" placeholder="Enter ID/Name">
                <button onclick="fetchMovieAPI()" style="background: #3498db;">Fetch Data</button>
            </div>
            <div class="scroll-area" id="apiResults">
                <p style="text-align: center; color: #666; margin-top: 20px;">API data will appear here.</p>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="player-wrapper">
            <div id="player-empty-state">
                Select a stream to start watching.
            </div>
            
            <div id="jw-player-container"></div>
            <div id="gesture-osd" class="gesture-osd"></div>
        </div>
        
        <div class="now-playing-bar" id="nowPlayingBar" style="display: none;">
            <div style="width: 100%; overflow: hidden;">
                <h3 id="npTitle">Movie Title</h3>
                <p id="npGroup">Stream Info</p>
            </div>
        </div>
    </div>

    <script>
        let folders = []; 
        let currentFolderIndex = -1;
        let currentCatalog = []; 
        let videoBrightness = 100;
        let currentRenderList = [];
        let renderedCount = 0;
        const CHUNK_SIZE = 50; 
        let listObserver = null;

        // ==========================================
        // 1. TABS & SWITCHING
        // ==========================================
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-library').style.display = tab === 'library' ? 'flex' : 'none';
            document.getElementById('tab-api').style.display = tab === 'api' ? 'flex' : 'none';
        }

        // ==========================================
        // 2. DATA PROCESSING (FETCH, URL, BULK, UPLOAD)
        // ==========================================
        async function fetchM3UFromServer() {
            try {
                document.getElementById('folderList').innerHTML = '<p style="text-align:center; color: #aaa;">Fetching local server file...</p>';
                const response = await fetch('playlist.m3u');
                if (!response.ok) throw new Error("Not found.");
                const text = await response.text();
                let parsedItems = text.trim().startsWith('{') || text.trim().startsWith('[') ? parseJSON(text) : parseM3U(text);
                if(parsedItems.length > 0) {
                    folders.push({ name: 'Server Playlist', items: parsedItems });
                    openFolder(folders.length - 1);
                }
            } catch (error) { 
                alert("playlist.m3u missing on server."); 
                renderFolders();
            }
        }

        // NEW: Fetch Remote Link Logic
        async function fetchRemotePlaylist() {
            const url = document.getElementById('remotePlaylistUrl').value.trim();
            if (!url) return alert("Please enter a valid URL.");
            
            document.getElementById('folderList').innerHTML = '<p style="text-align:center; color: #aaa;">Fetching remote URL...</p>';
            
            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("Failed to fetch.");
                const text = await response.text();
                
                let parsedItems = text.trim().startsWith('{') || text.trim().startsWith('[') ? parseJSON(text) : parseM3U(text);
                
                if(parsedItems.length > 0) {
                    let folderName = url.split('/').pop().split('?')[0];
                    if (!folderName || folderName.length < 2) folderName = 'Remote Playlist';
                    
                    folders.push({ name: folderName, items: parsedItems });
                    openFolder(folders.length - 1);
                    document.getElementById('remotePlaylistUrl').value = '';
                } else {
                    alert("No valid streams found in the fetched URL.");
                    renderFolders();
                }
            } catch (error) { 
                alert("Error: Fetch blocked by CORS or URL is invalid."); 
                renderFolders();
            }
        }

        function handleMultiFileUpload(event) {
            const files = event.target.files;
            let filesProcessed = 0;
            for (let i = 0; i < files.length; i++) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    let parsedItems = files[i].name.toLowerCase().endsWith('.json') ? parseJSON(e.target.result) : parseM3U(e.target.result);
                    if(parsedItems.length > 0) folders.push({ name: files[i].name, items: parsedItems });
                    filesProcessed++;
                    if(filesProcessed === files.length) renderFolders();
                };
                reader.readAsText(files[i]);
            }
        }

        function processBulkLinks() {
            const text = document.getElementById('bulkLinksInput').value.trim();
            if (!text) return alert("Paste text first.");
            let items = text.includes('#EXTINF') ? parseM3U(text) : [];
            if (items.length === 0) {
                text.split('\n').forEach((l, i) => {
                    if (l.trim().startsWith('http')) items.push({ title: "Stream " + (i + 1), mpd: l.trim(), group: "Bulk", lic: "", token: "", logo: "" });
                });
            }
            if (items.length > 0) {
                folders.push({ name: 'Bulk Import ' + new Date().toLocaleTimeString(), items: items });
                renderFolders();
                document.getElementById('bulkLinksInput').value = ''; 
            }
        }

        function parseJSON(jsonText) {
            let extracted = [];
            try {
                const data = JSON.parse(jsonText);
                let items = Array.isArray(data) ? data : (data.channels || data.data || []);
                items.forEach(item => {
                    let mpd = item.url || item.mpd || item.link || item.stream_url || "";
                    if (mpd) extracted.push({ title: item.name || item.title || "Stream", mpd, lic: item.lic || item.license || "", token: item.token || item.authorization || "", logo: item.logo || item.icon || "", group: item.group || "JSON" });
                });
            } catch (e) {}
            return extracted;
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            let extracted = [];
            let current = { title: "", logo: "", group: "Playlist", mpd: "", lic: "", token: "" };
            let hasExt = false;
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF')) {
                    hasExt = true;
                    current = { title: "Unknown", logo: "", group: "Playlist", mpd: "", lic: "", token: "" };
                    let m = line.match(/,(.+)$/);
                    if (m) current.title = m[1].trim();
                    let l = line.match(/tvg-logo="(.*?)"/);
                    if (l) current.logo = l[1];
                } else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
                    let p = line.replace('#KODIPROP:inputstream.adaptive.license_key=', '').split('|authorization=');
                    current.lic = p[0];
                    if (p[1]) current.token = p[1].split('&')[0];
                } else if (line.startsWith('http')) {
                    current.mpd = line;
                    if (!hasExt) current.title = "Direct Link " + (extracted.length + 1);
                    extracted.push({...current});
                    hasExt = false;
                }
            });
            return extracted;
        }

        // ==========================================
        // 3. UI RENDERING & LAZY LOAD
        // ==========================================
        function renderFolders() {
            document.getElementById('searchInput').style.display = 'none';
            document.getElementById('backBtnDiv').style.display = 'none';
            document.getElementById('movieList').style.display = 'none';
            const listDiv = document.getElementById('folderList');
            listDiv.style.display = 'block';
            listDiv.innerHTML = '';
            
            if (folders.length === 0) {
                listDiv.innerHTML = '<p style="text-align: center; color: #666; margin-top:20px;">Upload playlists or fetch URLs to start.</p>';
                return;
            }
            
            folders.forEach((folder, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'folder-item-wrapper';
                wrapper.innerHTML = `<div class="folder-item" onclick="openFolder(${index})">📁 ${folder.name} <span class="folder-count">${folder.items.length} items</span></div><button class="delete-btn" onclick="deleteFolder(${index}, event)">✖</button>`;
                listDiv.appendChild(wrapper);
            });
        }

        function deleteFolder(index, event) {
            event.stopPropagation();
            if(confirm("Delete playlist?")) { folders.splice(index, 1); renderFolders(); }
        }

        function openFolder(index) {
            currentFolderIndex = index;
            currentCatalog = folders[index].items;
            document.getElementById('folderList').style.display = 'none';
            document.getElementById('movieList').style.display = 'block';
            document.getElementById('searchInput').style.display = 'block';
            document.getElementById('backBtnDiv').style.display = 'block';
            initLazyRender(currentCatalog);
        }

        function showFolderList() { renderFolders(); }

        function filterPlaylist() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            initLazyRender(currentCatalog.filter(item => item.title.toLowerCase().includes(q)));
        }

        function initLazyRender(list) {
            currentRenderList = list; renderedCount = 0;
            const div = document.getElementById('movieList');
            div.innerHTML = ''; div.scrollTop = 0;
            
            if (list.length === 0) {
                div.innerHTML = '<p style="text-align:center; color:#888;">No results.</p>';
                return;
            }

            if (!listObserver) {
                listObserver = new IntersectionObserver((e) => { if (e[0].isIntersecting) loadMore(); }, { root: div, rootMargin: '200px' });
            }
            loadMore();
        }

        function loadMore() {
            const div = document.getElementById('movieList');
            const oldSentinel = document.getElementById('lazy-sentinel');
            if (oldSentinel) { listObserver.unobserve(oldSentinel); oldSentinel.remove(); }
            
            const end = Math.min(renderedCount + CHUNK_SIZE, currentRenderList.length);
            const fragment = document.createDocumentFragment();
            
            for (let i = renderedCount; i < end; i++) {
                const m = currentRenderList[i];
                const item = document.createElement('div');
                item.className = 'movie-item';
                item.onclick = () => { 
                    document.querySelectorAll('.movie-item').forEach(el => el.classList.remove('active')); 
                    item.classList.add('active'); 
                    playMovie(m); 
                };
                item.innerHTML = `<img loading="lazy" src="${m.logo || 'https://via.placeholder.com/40x40/111/444?text=▶'}" class="movie-icon"><div class="movie-info"><div class="movie-title">${m.title}</div><div class="movie-group">${m.group || 'VOD'}</div></div>`;
                fragment.appendChild(item);
            }
            
            div.appendChild(fragment);
            renderedCount = end;
            
            if (renderedCount < currentRenderList.length) {
                const sentinel = document.createElement('div'); sentinel.id = 'lazy-sentinel'; sentinel.style.height = '10px';
                div.appendChild(sentinel); listObserver.observe(sentinel);
            }
        }

        // ==========================================
        // 4. PLAYER CORE & GESTURES
        // ==========================================
        function playMovie(movie) {
            document.getElementById('player-empty-state').style.display = 'none';
            document.getElementById('nowPlayingBar').style.display = 'flex';
            document.getElementById('npTitle').innerText = movie.title || 'Unknown Title';
            document.getElementById('npGroup').innerText = movie.group || 'Stream';
            
            let drm = undefined;
            if (movie.lic) {
                let headers = [{ name: "Content-Type", value: "application/octet-stream" }];
                if (movie.token) headers.push({ name: "authorization", value: movie.token });
                drm = { widevine: { url: movie.lic, headers: headers } };
            }

            const player = jwplayer("jw-player-container").setup({
                file: movie.mpd, 
                drm: drm, 
                width: "100%", 
                height: "100%", 
                autostart: true, 
                stretching: "uniform", 
                cast: {}
            });

            player.on('ready', () => attachGestures(document.querySelector('.jw-media') || document.getElementById('jw-player-container'), player));
        }

        function showOSD(text) {
            const osd = document.getElementById('gesture-osd');
            osd.innerText = text; osd.style.opacity = '1';
            setTimeout(() => osd.style.opacity = '0', 1000);
        }

        function attachGestures(touchArea, playerRef) {
            if (!touchArea) return;
            let startX, startY;
            touchArea.addEventListener('touchstart', (e) => { 
                startX = e.touches[0].clientX; 
                startY = e.touches[0].clientY; 
            });
            touchArea.addEventListener('touchend', (e) => {
                let dx = e.changedTouches[0].clientX - startX;
                let dy = e.changedTouches[0].clientY - startY;
                
                if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;

                if (Math.abs(dx) > Math.abs(dy)) {
                    let pos = playerRef.getPosition() + (dx > 0 ? 10 : -10);
                    playerRef.seek(pos); 
                    showOSD(dx > 0 ? '⏩ +10s' : '⏪ -10s');
                } else {
                    if (startX > touchArea.clientWidth / 2) {
                        let vol = Math.max(0, Math.min(100, playerRef.getVolume() + (dy < 0 ? 10 : -10)));
                        playerRef.setVolume(vol); 
                        showOSD(`🔊 ${vol}%`);
                    } else {
                        videoBrightness = Math.max(20, Math.min(200, videoBrightness + (dy < 0 ? 10 : -10)));
                        const vid = document.querySelector('.jw-video');
                        if(vid) vid.style.filter = `brightness(${videoBrightness}%)`;
                        showOSD(`☀️ ${videoBrightness}%`);
                    }
                }
            });
        }

        // ==========================================
        // 5. API HUB LOGIC
        // ==========================================
        function updateApiPlaceholder() {
            const s = document.getElementById('apiService').value;
            document.getElementById('apiId').placeholder = s.includes('streaming') ? "Enter IMDb/TMDb ID" : "Enter Search Query";
        }

        async function fetchMovieAPI() {
            const key = document.getElementById('apiKey').value;
            const service = document.getElementById('apiService').value;
            const query = document.getElementById('apiId').value;
            const res = document.getElementById('apiResults');
            
            if (!key || !query) return alert("Please enter API Key and Search Query");
            res.innerHTML = 'Fetching data...';
            
            let url = '', host = '';
            if (service === 'streaming-movie') { url = `https://streaming-availability.p.rapidapi.com/shows/movie/${query}`; host = 'streaming-availability.p.rapidapi.com'; }
            else if (service === 'netflix-search') { url = `https://netflix-movies-and-tv-shows-api-by-apirobots.p.rapidapi.com/v1/netflix?name=${query}&page=1`; host = 'netflix-movies-and-tv-shows-api-by-apirobots.p.rapidapi.com'; }
            else if (service === 'rt-spoilers') { url = `https://rottentomato.p.rapidapi.com/get-spoilers-for-movie?spoiler_id=${query}`; host = 'rottentomato.p.rapidapi.com'; }
            else if (service === 'imdb-actor') { url = `https://imdb236.p.rapidapi.com/api/imdb/cast/${query}/titles`; host = 'imdb236.p.rapidapi.com'; }
            
            try {
                const response = await fetch(url, { headers: { 'x-rapidapi-key': key, 'x-rapidapi-host': host } });
                const data = await response.json();
                res.innerHTML = `<div class="api-result-card"><div class="api-result-title">Data Received</div><div class="api-result-desc"><pre style="font-size:10px; color:#2ecc71; background:#000; padding:10px; overflow:auto;">${JSON.stringify(data, null, 2)}</pre></div></div>`;
            } catch(e) { 
                res.innerHTML = 'Error fetching API.'; 
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium OTT Master Dashboard | Pro Hub</title>
    
    <script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>
    <script type="text/javascript">
        jwplayer.key = 'Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==';
    </script>

    <style>
        :root { --bg: #0f1115; --panel: #1a1d24; --border: #2d3139; --accent: #e50914; --text: #fff; }
        
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation;}
        
        /* Sidebar */
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; min-height: 0; overflow: hidden; }
        .sidebar-header { padding: 15px; background: #111; text-align: center; flex: none; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { margin: 0; color: var(--accent); font-size: 18px; text-transform: uppercase; letter-spacing: 1px; }

        /* Controls Area */
        .controls { padding: 10px 15px; border-bottom: 1px solid var(--border); background: #15181e; flex: none; overflow-y: auto; max-height: 40vh;}
        .controls button { width: 100%; padding: 8px; margin-bottom: 5px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; font-size: 11px;}
        .controls button:hover { background: #b20710; }
        .custom-input { width: 100%; padding: 6px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; font-size: 12px; box-sizing: border-box; margin-bottom: 5px;}
        .custom-input:focus { outline: none; border-color: var(--accent); }
        .bulk-textarea { resize: none; height: 60px; font-family: monospace; }

        .tab-content-wrapper { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }

        /* Scroll Area (Fast Rendering Support) */
        .scroll-area { flex: 1; overflow-y: auto; padding: 10px; min-height: 0; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
        
        /* Folder Styling */
        .folder-item-wrapper { display: flex; align-items: center; margin-bottom: 8px; background: #232730; border-radius: 8px; border-left: 4px solid #f39c12; transition: 0.2s; }
        .folder-item-wrapper:hover { background: #2d3139; }
        .folder-item { flex: 1; padding: 12px; cursor: pointer; font-weight: bold; display: flex; justify-content: space-between; align-items: center; font-size: 13px;}
        .folder-count { background: #111; padding: 3px 6px; border-radius: 10px; font-size: 10px; color: #aaa; }
        .delete-btn { background: transparent !important; color: #e74c3c !important; width: auto !important; padding: 10px 12px !important; margin: 0 !important; font-size: 14px; border-left: 1px solid #333 !important; border-radius: 0 8px 8px 0 !important; cursor: pointer; }

        /* Movie/Item Styling */
        .movie-item { display: flex; align-items: center; padding: 8px; margin-bottom: 6px; background: #232730; border-radius: 8px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .movie-item:hover, .movie-item.active { background: #2d3139; border-left: 4px solid var(--accent); }
        .movie-icon { width: 35px; height: 35px; border-radius: 5px; margin-right: 12px; object-fit: contain; background: #000; }
        .movie-info { flex: 1; overflow: hidden; }
        .movie-title { font-size: 13px; font-weight: bold; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-group { font-size: 10px; color: #aaa; background: #333; padding: 2px 6px; border-radius: 4px; display: inline-block; }

        /* Main Content & Player Layout Fixes */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; min-height: 0; }
        
        /* Absolute positioned bounds to force JW Player to stay within the lines */
        .player-bounds { position: relative; width: 100%; flex: 1; background: #000; overflow: hidden; min-height: 0; }
        .player-wrapper { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: center; }
        
        #jw-player-container { width: 100% !important; height: 100% !important; z-index: 1; }
        
        #player-empty-state { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; justify-content: center; align-items: center; color: #444; font-size: 16px; z-index: 5; }

        .gesture-osd { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.7); color: #fff; padding: 15px 25px; border-radius: 10px; font-size: 20px; font-weight: bold; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 99; text-align: center; }

        .now-playing-bar { padding: 10px 15px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 10; flex: none; height: 40px; box-sizing: border-box;}
        .now-playing-bar h3 { margin: 0; font-size: 14px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2;}
        .now-playing-bar p { margin: 2px 0 0 0; color: #aaa; font-size: 10px; }

        /* 🎬 WATCHING MODE (Playlist Opened) */
        body.watching-mode { flex-direction: column; }
        body.watching-mode .main-content { order: 1; flex: 0 0 55vh; border-bottom: 1px solid var(--border); border-left: none; }
        body.watching-mode .sidebar { order: 2; flex: 1; width: 100%; border-right: none; }
        body.watching-mode .sidebar-header { display: none; }
        body.watching-mode #library-controls > button, 
        body.watching-mode #library-controls > textarea { display: none !important; }
        body.watching-mode #library-controls { padding: 10px; max-height: none; border-bottom: none;}

        /* 📱 MOBILE RESPONSIVE LAYOUT */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .main-content { flex: 0 0 35vh; order: 1; border-bottom: 1px solid var(--border); }
            body.watching-mode .main-content { flex: 0 0 40vh; } 
            .sidebar { width: 100%; flex: 1; order: 2; border-right: none; display: flex; flex-direction: column; min-height: 0; }
            .sidebar-header { padding: 10px; }
            .sidebar-header h2 { font-size: 16px; margin: 0; }
            .controls { max-height: 30vh; padding: 8px 10px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🍿 Premium VOD Hub</h2>
        </div>
        
        <div id="tab-library" class="tab-content-wrapper" style="display: flex;">
            <div class="controls" id="library-controls">
                <button onclick="fetchM3UFromServer()">🌐 Auto-Scan Server Files</button>
                <button onclick="document.getElementById('m3uFile').click()" style="background: #34495e;">📁 Upload Files (Any Format)</button>
                <input type="file" id="m3uFile" accept=".m3u,.m3u8,.txt,.json,.xml" onchange="handleMultiFileUpload(event)" multiple style="display:none;">

                <textarea id="bulkLinksInput" class="custom-input bulk-textarea" placeholder="Paste Links, M3U text, or mixed content here..."></textarea>
                <button onclick="processBulkLinks()" style="background: #e67e22;">📥 Process Text / Links</button>
                <button onclick="clearAllFolders()" style="background: #c0392b; margin-top: 10px;">🗑️ Clear All Playlists</button>

                <div id="backBtnDiv" style="display:none; margin-bottom:5px;">
                    <button onclick="showFolderList()" style="background: #95a5a6; padding: 8px; width: 100%;">🔙 Back to Playlists</button>
                </div>
                <input type="text" id="searchInput" class="custom-input" placeholder="🔍 Search in playlist..." onkeyup="filterPlaylist()" style="display:none;">
            </div>

            <div class="scroll-area" id="folderList">
                <p style="text-align: center; color: #666; margin-top: 20px;">Upload playlists or auto-scan server to start.</p>
            </div>
            <div class="scroll-area" id="movieList" style="display: none;"></div>
        </div>
    </div>

    <div class="main-content">
        <div class="player-bounds">
            <div class="player-wrapper">
                <div id="player-empty-state">
                    Select a stream to start watching.
                </div>
                
                <div id="jw-player-container"></div>
                
                <div id="gesture-osd" class="gesture-osd"></div>
            </div>
        </div>
        
        <div class="now-playing-bar" id="nowPlayingBar" style="display: none;">
            <div style="width: 100%; overflow: hidden;">
                <h3 id="npTitle">Movie Title</h3>
                <p id="npGroup">Stream Info</p>
            </div>
        </div>
    </div>

    <script>
        let folders = []; 
        let currentFolderIndex = -1;
        let currentCatalog = []; 
        let videoBrightness = 100;

        // ==========================================
        // 1. ADVANCED DATA PROCESSING
        // ==========================================
        function extractFromDeepJSON(obj, results) {
            if (!obj) return;
            if (Array.isArray(obj)) {
                obj.forEach(item => extractFromDeepJSON(item, results));
            } else if (typeof obj === 'object') {
                let url = obj.url || obj.mpd || obj.link || obj.stream_url || obj.file || obj.src || obj.source || obj.hls || obj.dash;
                
                if (url && typeof url === 'string' && url.startsWith('http') && !url.match(/\.(jpg|jpeg|png|gif|svg|webp)$/i)) {
                    let title = obj.name || obj.title || obj.channel || obj.id || obj.description || "Unknown Stream";
                    let logo = obj.logo || obj.icon || obj.image || obj.poster || obj.thumbnail || "";
                    let group = obj.group || obj.category || obj.genre || "JSON Data";
                    let lic = obj.lic || obj.license || obj.key || "";
                    let token = obj.token || obj.authorization || obj.auth || "";
                    
                    results.push({ title, mpd: url, logo, group, lic, token });
                }
                
                Object.values(obj).forEach(val => extractFromDeepJSON(val, results));
            }
        }

        function parseJSON(jsonText) {
            let extracted = [];
            try {
                const data = JSON.parse(jsonText);
                extractFromDeepJSON(data, extracted);
            } catch (e) { console.error("JSON parsing failed", e); }
            return extracted;
        }

        function parseM3U(text) {
            const lines = text.split('\n');
            let extracted = [];
            let current = { title: "", logo: "", group: "Playlist", mpd: "", lic: "", token: "" };
            let hasExt = false;
            
            lines.forEach(line => {
                line = line.trim();
                if (line.startsWith('#EXTINF')) {
                    hasExt = true;
                    current = { title: "Unknown", logo: "", group: "Playlist", mpd: "", lic: "", token: "" };
                    let m = line.match(/,(.+)$/);
                    if (m) current.title = m[1].trim();
                    let l = line.match(/tvg-logo="(.*?)"/);
                    if (l) current.logo = l[1];
                    let g = line.match(/group-title="(.*?)"/);
                    if (g) current.group = g[1];
                } else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=')) {
                    let p = line.replace('#KODIPROP:inputstream.adaptive.license_key=', '').split('|authorization=');
                    current.lic = p[0];
                    if (p[1]) current.token = p[1].split('&')[0];
                } else if (line.startsWith('http')) {
                    current.mpd = line;
                    if (!hasExt) current.title = "Direct Link " + (extracted.length + 1);
                    extracted.push({...current});
                    hasExt = false;
                }
            });
            return extracted;
        }

        // --- NEW: ADVANCED DIRECTORY SCRAPER ---
        async function fetchM3UFromServer() {
            document.getElementById('folderList').innerHTML = '<p style="text-align:center; color: #aaa;">Scanning server for files...</p>';
            
            let filesToFetch = [];
            let foundAny = false;

            try {
                // Step 1: Attempt to scrape the server directory listing
                const dirResponse = await fetch('./');
                if (dirResponse.ok) {
                    const dirHtml = await dirResponse.text();
                    
                    // Parse the HTML to find all links in the directory
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(dirHtml, 'text/html');
                    const links = doc.querySelectorAll('a');
                    
                    links.forEach(link => {
                        const href = link.getAttribute('href');
                        // Grab anything that looks like a playlist or data file
                        if (href && href.match(/\.(m3u|m3u8|json|txt|xml)$/i)) {
                            // Avoid fetching the current page if it accidentally matches
                            if (!filesToFetch.includes(href) && href !== 'index.html') {
                                filesToFetch.push(href);
                            }
                        }
                    });
                }
            } catch (e) {
                console.warn("Directory scraping failed. Server might not allow it.");
            }

            // Step 2: Fallback list if the server hides its directory structure
            if (filesToFetch.length === 0) {
                console.log("No directory index found. Using fallback list.");
                filesToFetch = [
                    'playlist.m3u', 'playlist.m3u8', 'channels.json', 'movies.json', 
                    'streams.txt', 'tv.m3u', 'data.json', 'live.m3u', 'vod.json'
                ];
            }

            // Step 3: Download everything we found simultaneously
            await Promise.allSettled(filesToFetch.map(async (fileName) => {
                try {
                    const response = await fetch(fileName);
                    if (response.ok) {
                        const text = await response.text();
                        let parsedItems = [];
                        
                        // Detect format dynamically
                        if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
                            parsedItems = parseJSON(text);
                        } else {
                            parsedItems = parseM3U(text);
                        }
                        
                        // If valid streams were found, add as a new playlist folder
                        if (parsedItems.length > 0) {
                            // Decode URL components for a cleaner display name
                            const cleanName = decodeURIComponent(fileName.split('/').pop());
                            folders.push({ name: cleanName, items: parsedItems });
                            foundAny = true;
                        }
                    }
                } catch (e) { } // Silently ignore files from the fallback list that don't exist
            }));

            if (!foundAny) {
                alert("No playlists found! Make sure your files are in the same folder as this page, OR ensure your web server has 'Directory Indexing' enabled to find custom names.");
            }
            renderFolders();
        }

        function handleMultiFileUpload(event) {
            const files = event.target.files;
            let filesProcessed = 0;
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                reader.onload = function(e) {
                    const text = e.target.result;
                    let parsedItems = (text.trim().startsWith('{') || text.trim().startsWith('[')) ? parseJSON(text) : parseM3U(text);
                    if(parsedItems.length > 0) folders.push({ name: file.name, items: parsedItems });
                    filesProcessed++;
                    if(filesProcessed === files.length) renderFolders();
                };
                reader.readAsText(file);
            }
        }

        function processBulkLinks() {
            const text = document.getElementById('bulkLinksInput').value.trim();
            if (!text) return;
            
            let items = [];
            if (text.startsWith('{') || text.startsWith('[')) {
                items = parseJSON(text);
            } else if (text.includes('#EXTINF')) {
                items = parseM3U(text);
            } else {
                const urls = text.match(/https?:\/\/[^\s]+/g) || [];
                urls.forEach((url, i) => {
                    items.push({ title: "Extracted Stream " + (i + 1), mpd: url.trim(), group: "Bulk", lic: "", token: "", logo: "" });
                });
            }

            if (items.length > 0) {
                folders.push({ name: 'Imported Mix ' + new Date().toLocaleTimeString(), items: items });
                renderFolders();
                document.getElementById('bulkLinksInput').value = ''; 
            } else {
                alert("No valid streams found in text.");
            }
        }

        // ==========================================
        // 2. UI RENDERING & WATCH MODE LOGIC
        // ==========================================
        function renderFolders() {
            document.body.classList.remove('watching-mode');
            
            document.getElementById('searchInput').style.display = 'none';
            document.getElementById('backBtnDiv').style.display = 'none';
            document.getElementById('movieList').style.display = 'none';
            const listDiv = document.getElementById('folderList');
            listDiv.style.display = 'block';
            listDiv.innerHTML = '';
            
            if (folders.length === 0) {
                listDiv.innerHTML = '<p style="text-align: center; color: #666; margin-top:20px;">Upload playlists or auto-scan server to start.</p>';
                return;
            }
            
            folders.forEach((folder, index) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'folder-item-wrapper';
                wrapper.innerHTML = `<div class="folder-item" onclick="openFolder(${index})">📁 ${folder.name} <span class="folder-count">${folder.items.length} items</span></div><button class="delete-btn" onclick="deleteFolder(${index}, event)">✖</button>`;
                listDiv.appendChild(wrapper);
            });
        }

        function deleteFolder(index, event) {
            event.stopPropagation();
            if(confirm("Delete playlist?")) { folders.splice(index, 1); renderFolders(); }
        }

        function clearAllFolders() {
            if(confirm("Are you sure you want to clear all imported playlists?")) {
                folders = [];
                currentFolderIndex = -1;
                currentCatalog = [];
                renderFolders();
            }
        }

        function openFolder(index) {
            currentFolderIndex = index;
            currentCatalog = folders[index].items;
            
            document.body.classList.add('watching-mode');
            
            document.getElementById('folderList').style.display = 'none';
            document.getElementById('movieList').style.display = 'block';
            document.getElementById('searchInput').style.display = 'block';
            document.getElementById('backBtnDiv').style.display = 'block';
            
            renderPlaylist(currentCatalog);
            
            // Force resize if a player is already active so controls readjust
            if(window.jwplayer && jwplayer("jw-player-container").getState) {
                setTimeout(() => jwplayer("jw-player-container").resize(), 100);
            }
        }

        function showFolderList() { renderFolders(); }

        function filterPlaylist() {
            let q = document.getElementById('searchInput').value.toLowerCase();
            renderPlaylist(currentCatalog.filter(item => item.title.toLowerCase().includes(q)));
        }

        function renderPlaylist(list) {
            const listDiv = document.getElementById('movieList');
            listDiv.innerHTML = '';
            listDiv.scrollTop = 0;
            
            if (list.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color:#888;">No results.</p>';
                return;
            }

            const fragment = document.createDocumentFragment();
            list.forEach(m => {
                const item = document.createElement('div');
                item.className = 'movie-item';
                item.onclick = () => { 
                    document.querySelectorAll('.movie-item').forEach(el => el.classList.remove('active')); 
                    item.classList.add('active'); 
                    playMovie(m); 
                };
                item.innerHTML = `<img loading="lazy" src="${m.logo || 'https://via.placeholder.com/40x40/111/444?text=▶'}" class="movie-icon"><div class="movie-info"><div class="movie-title">${m.title}</div><div class="movie-group">${m.group || 'Stream'}</div></div>`;
                fragment.appendChild(item);
            });
            listDiv.appendChild(fragment);
        }

        // ==========================================
        // 3. ADVANCED PLAYER CORE & GESTURES
        // ==========================================
        function playMovie(movie) {
            document.getElementById('player-empty-state').style.display = 'none';
            document.getElementById('nowPlayingBar').style.display = 'flex';
            document.getElementById('npTitle').innerText = movie.title || 'Unknown Title';
            document.getElementById('npGroup').innerText = movie.group || 'Stream';
            
            let url = movie.mpd;
            let urlLower = url.toLowerCase();
            let forcedType = undefined;

            if (urlLower.includes('.m3u8')) forcedType = 'hls';
            else if (urlLower.includes('.mpd')) forcedType = 'dash';
            else if (urlLower.includes('.mp4')) forcedType = 'mp4';
            else if (urlLower.includes('.mkv')) forcedType = 'hls'; 

            let drm = undefined;
            if (movie.lic) {
                let headers = [{ name: "Content-Type", value: "application/octet-stream" }];
                if (movie.token) headers.push({ name: "authorization", value: movie.token });
                drm = { widevine: { url: movie.lic, headers: headers } };
            }

            let setupConfig = {
                file: url, 
                width: "100%", 
                height: "100%", 
                autostart: true, 
                controls: true, // EXPLICITLY SHOW CONTROLS
                stretching: "uniform", 
                cast: {}
            };

            if (forcedType) setupConfig.type = forcedType;
            if (drm) setupConfig.drm = drm;

            const player = jwplayer("jw-player-container").setup(setupConfig);

            player.on('ready', () => {
                attachGestures(document.querySelector('.jw-media') || document.getElementById('jw-player-container'), player);
                // Double check layout sizing after a tiny delay
                setTimeout(() => player.resize(), 50);
            });
            
            player.on('error', (e) => {
                console.error("Player Error:", e);
                showOSD("Stream failed to load.");
            });
        }

        function showOSD(text) {
            const osd = document.getElementById('gesture-osd');
            osd.innerText = text; osd.style.opacity = '1';
            setTimeout(() => osd.style.opacity = '0', 1000);
        }

        function attachGestures(touchArea, playerRef) {
            if (!touchArea) return;
            let startX, startY;
            touchArea.addEventListener('touchstart', (e) => { 
                // Ignore touches on controls
                if (e.target.closest('.jw-controls')) return;
                startX = e.touches[0].clientX; 
                startY = e.touches[0].clientY; 
            });
            touchArea.addEventListener('touchend', (e) => {
                if (!startX || !startY) return; // Means touch started on UI
                
                let dx = e.changedTouches[0].clientX - startX;
                let dy = e.changedTouches[0].clientY - startY;
                
                if (Math.abs(dx) < 30 && Math.abs(dy) < 30) {
                    startX = null; startY = null;
                    return; // Normal tap, let it pass through to toggle UI
                }

                if (Math.abs(dx) > Math.abs(dy)) {
                    let pos = playerRef.getPosition() + (dx > 0 ? 10 : -10);
                    playerRef.seek(pos); 
                    showOSD(dx > 0 ? '⏩ +10s' : '⏪ -10s');
                } else {
                    if (startX > touchArea.clientWidth / 2) {
                        let vol = Math.max(0, Math.min(100, playerRef.getVolume() + (dy < 0 ? 10 : -10)));
                        playerRef.setVolume(vol); 
                        showOSD(`🔊 ${vol}%`);
                    } else {
                        videoBrightness = Math.max(20, Math.min(200, videoBrightness + (dy < 0 ? 10 : -10)));
                        const vid = document.querySelector('.jw-video');
                        if(vid) vid.style.filter = `brightness(${videoBrightness}%)`;
                        showOSD(`☀️ ${videoBrightness}%`);
                    }
                }
                startX = null; startY = null;
            });
        }
    </script>
</body>
</html>

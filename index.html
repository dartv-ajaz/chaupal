<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Events & Movies Dashboard</title>
    
    <script src="https://content.jwplatform.com/libraries/KB5zFt7A.js"></script>
    <script type="text/javascript">
        jwplayer.key = 'Khpp2dHxlBJHC8MCmLnBuV2jK/DwDnJMniwF6EO9HC/riJ712ZmbHg==';
    </script>

    <style>
        :root { --bg: #0f1115; --panel: #1a1d24; --border: #2d3139; --accent: #e50914; --text: #fff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar (Playlist Gallery) */
        .sidebar { width: 350px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 20px; background: #111; border-bottom: 1px solid var(--border); text-align: center; }
        .sidebar-header h2 { margin: 0; color: var(--accent); font-size: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .sidebar-header p { margin: 5px 0 0 0; font-size: 12px; color: #888; }
        
        /* Auto-Load & File Upload Controls */
        .controls { padding: 15px; border-bottom: 1px solid var(--border); background: #15181e; }
        .controls button { width: 100%; padding: 10px; margin-bottom: 10px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.3s; }
        .controls button:hover { background: #b20710; }
        .file-input-wrapper { text-align: left; font-size: 12px; color: #aaa; margin-bottom: 10px; }
        
        /* Custom Inputs */
        .custom-input { width: 100%; padding: 8px; border-radius: 5px; border: 1px solid #444; background: #111; color: #fff; font-size: 13px; box-sizing: border-box; }
        .custom-input:focus { outline: none; border-color: var(--accent); }

        /* Movie List */
        .movie-list { flex: 1; overflow-y: auto; padding: 10px; }
        .movie-list::-webkit-scrollbar { width: 6px; }
        .movie-list::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
        
        .movie-item { display: flex; align-items: center; padding: 10px; margin-bottom: 8px; background: #232730; border-radius: 8px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .movie-item:hover { background: #2d3139; border-left: 4px solid var(--accent); }
        .movie-item.active { background: #2d3139; border-left: 4px solid var(--accent); }
        
        .movie-icon { width: 40px; height: 40px; border-radius: 5px; margin-right: 15px; object-fit: contain; background: #000; }
        .movie-info { flex: 1; overflow: hidden; }
        .movie-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .movie-group { font-size: 10px; color: #aaa; background: #333; padding: 2px 6px; border-radius: 4px; display: inline-block; }

        /* Main Player Area */
        .main-content { flex: 1; display: flex; flex-direction: column; background: #000; position: relative; }
        .player-wrapper { width: 100%; flex: 1; display: flex; justify-content: center; align-items: center; }
        
        .now-playing-bar { padding: 20px; background: var(--panel); border-top: 1px solid var(--border); display: flex; align-items: center; z-index: 10;}
        .now-playing-bar h3 { margin: 0; font-size: 22px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .now-playing-bar p { margin: 5px 0 0 0; color: #aaa; font-size: 14px; }

        /* 📱 MOBILE RESPONSIVENESS */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; flex: 1; order: 2; border-right: none; border-top: 1px solid var(--border); overflow: hidden; }
            .main-content { height: 45vh; flex: none; order: 1; }
            .now-playing-bar { padding: 10px 15px; }
            .now-playing-bar h3 { font-size: 16px; }
            .now-playing-bar p { font-size: 12px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>🍿 Premium VOD</h2>
            <p>DRM Protected Content</p>
        </div>
        
        <div class="controls">
            <button onclick="fetchM3UFromServer()">Load Server Playlist</button>
            
            <div class="file-input-wrapper">
                <span style="display:block; margin-bottom: 5px;">Or upload local .m3u / .json file:</span>
                <input type="file" id="m3uFile" accept=".m3u,.m3u8,.txt,.json" onchange="handleFileUpload(event)" class="custom-input" style="padding: 5px;">
            </div>

            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="text" id="directLinkInput" class="custom-input" placeholder="Paste Direct Link (.mpd / .m3u8)...">
                <button onclick="playDirectLink()" style="margin: 0; width: auto; padding: 8px 15px;">Play</button>
            </div>

            <input type="text" id="searchInput" class="custom-input" placeholder="🔍 Search channels or movies..." onkeyup="filterPlaylist()">
        </div>

        <div class="movie-list" id="movieList">
            <p style="text-align: center; color: #666; margin-top: 20px;">No playlist loaded.</p>
        </div>
    </div>

    <div class="main-content">
        <div class="player-wrapper">
            <div id="jw-player-container" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;">
                <p style="color: #444; font-size: 20px;">Select a movie from the playlist to start watching.</p>
            </div>
        </div>
        
        <div class="now-playing-bar" id="nowPlayingBar" style="display: none;">
            <div style="width: 100%; overflow: hidden;">
                <h3 id="npTitle">Movie Title</h3>
                <p id="npGroup">Platform / Group</p>
            </div>
        </div>
    </div>

    <script>
        let catalog = [];

        // 1. Fetch from your website server
        async function fetchM3UFromServer() {
            try {
                document.getElementById('movieList').innerHTML = '<p style="text-align:center; color: #aaa;">Loading playlist...</p>';
                const response = await fetch('playlist.m3u');
                if (!response.ok) throw new Error("File not found on server.");
                const text = await response.text();
                
                // Auto-detect JSON vs M3U
                if (text.trim().startsWith('{') || text.trim().startsWith('[')) {
                    parseJSON(text);
                } else {
                    parseM3U(text);
                }
            } catch (error) {
                alert("Error: Make sure 'playlist.m3u' is uploaded to your server. Or use the manual upload button.");
                document.getElementById('movieList').innerHTML = '';
            }
        }

        // 2. Read from manual file upload
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const content = e.target.result;
                if (file.name.toLowerCase().endsWith('.json')) {
                    parseJSON(content);
                } else {
                    parseM3U(content);
                }
            };
            reader.readAsText(file);
        }

        // 3. Play Direct Link
        function playDirectLink() {
            const link = document.getElementById('directLinkInput').value.trim();
            if (!link) return alert("Please enter a valid link.");
            
            const customStream = {
                title: "Direct Stream",
                group: "Manual Input",
                mpd: link,
                lic: "",
                token: "",
                logo: ""
            };
            
            document.querySelectorAll('.movie-item').forEach(el => el.classList.remove('active'));
            playMovie(customStream);
        }

        // 4. Ultra-Smart JSON Parser (Handles Nested & Complex JSONs)
        function parseJSON(jsonText) {
            try {
                const data = JSON.parse(jsonText);
                catalog = [];
                let items = [];

                function findArray(obj) {
                    if (Array.isArray(obj)) {
                        if (obj.length > 0 && typeof obj[0] === 'object') {
                            if (obj[0].url || obj[0].link || obj[0].channel_url || obj[0].mpd || obj[0].file) return obj;
                        }
                    } else if (typeof obj === 'object' && obj !== null) {
                        for (let key in obj) {
                            let result = findArray(obj[key]);
                            if (result.length > 0) return result;
                        }
                    }
                    return [];
                }

                items = findArray(data);

                if (items.length === 0) {
                    for (let key in data) {
                        if (data[key] && (data[key].url || data[key].link || data[key].mpd)) {
                            items.push(data[key]);
                        }
                    }
                }

                items.forEach(item => {
                    let title = item.title || item.name || item.channel_name || item.channelName || item.id || "Unknown Stream";
                    let mpd = item.url || item.mpd || item.link || item.stream_url || item.channel_url || item.file || item.source || "";
                    let lic = item.lic || item.license || item.clearkey || item.key_url || item.drm_key || item.drm_license_url || item.key || "";
                    let token = item.token || item.authorization || item.auth || item.header || "";
                    let logo = item.logo || item.icon || item.image || item.tvg_logo || item.logo_url || "";
                    let group = item.group || item.category || item.genre || item.network || item.cat_name || "JSON Playlist";

                    if (item.headers && typeof item.headers === 'object') {
                        token = item.headers.authorization || item.headers.Authorization || item.headers.Cookie || token;
                    }

                    if (mpd && typeof mpd === 'string' && mpd.length > 5) {
                        catalog.push({ title, mpd, lic, token, logo, group });
                    }
                });

                if (catalog.length === 0) {
                    document.getElementById('movieList').innerHTML = '<p style="text-align:center; color: #ff5e62;">No valid streams found in JSON.</p>';
                } else {
                    renderPlaylist(catalog);
                }
            } catch (e) {
                alert("Invalid JSON File: " + e.message);
            }
        }

        // 5. Original M3U Parser
        function parseM3U(m3uText) {
            const lines = m3uText.split('\n');
            catalog = [];
            let currentItem = null;

            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                
                if (line.startsWith('#EXTINF')) {
                    currentItem = { title: "", logo: "", group: "", mpd: "", lic: "", token: "" };
                    
                    let titleMatch = line.match(/,(.+)$/);
                    if (titleMatch) currentItem.title = titleMatch[1].trim();
                    
                    let logoMatch = line.match(/tvg-logo="(.*?)"/);
                    if (logoMatch) currentItem.logo = logoMatch[1];
                    
                    let groupMatch = line.match(/group-title="(.*?)"/);
                    if (groupMatch) currentItem.group = groupMatch[1];

                } else if (line.startsWith('#KODIPROP:inputstream.adaptive.license_key=') && currentItem) {
                    let keyString = line.replace('#KODIPROP:inputstream.adaptive.license_key=', '');
                    let parts = keyString.split('|authorization=');
                    currentItem.lic = parts[0];
                    if (parts.length > 1) {
                        let tokenPart = parts[1].split('&')[0]; 
                        currentItem.token = tokenPart;
                    }

                } else if (line.startsWith('http') && currentItem) {
                    currentItem.mpd = line;
                    catalog.push(currentItem);
                    currentItem = null; 
                }
            }
            renderPlaylist(catalog);
        }

        // 6. Search Filter
        function filterPlaylist() {
            let query = document.getElementById('searchInput').value.toLowerCase();
            let filtered = catalog.filter(item => 
                item.title.toLowerCase().includes(query) || (item.group && item.group.toLowerCase().includes(query))
            );
            renderPlaylist(filtered);
        }

        // 7. Render the Clickable Gallery
        function renderPlaylist(listToRender = catalog) {
            const listDiv = document.getElementById('movieList');
            listDiv.innerHTML = '';

            if (listToRender.length === 0) {
                listDiv.innerHTML = '<p style="text-align:center; color: #888;">No results found.</p>';
                return;
            }

            listToRender.forEach((movie) => {
                const item = document.createElement('div');
                item.className = 'movie-item';
                item.onclick = () => {
                    document.querySelectorAll('.movie-item').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');
                    playMovie(movie);
                };

                const logoSrc = movie.logo || 'https://via.placeholder.com/40x40/111/444?text=▶';

                item.innerHTML = `
                    <img src="${logoSrc}" class="movie-icon" alt="logo" onerror="this.src='https://via.placeholder.com/40x40/111/444?text=▶'">
                    <div class="movie-info">
                        <div class="movie-title">${movie.title}</div>
                        <div class="movie-group">${movie.group || 'VOD'}</div>
                    </div>
                `;
                listDiv.appendChild(item);
            });
        }

        // 8. Feed the DRM Data to JW Player
        function playMovie(movie) {
            // Update UI
            document.getElementById('nowPlayingBar').style.display = 'flex';
            document.getElementById('npTitle').innerText = movie.title;
            document.getElementById('npGroup').innerText = movie.group || 'Premium Content';

            let drmConfig = {};
            
            if (movie.lic) {
                let licStr = movie.lic.trim();
                
                // Support for JSON ClearKey arrays (e.g. kid:key format)
                if (licStr.includes(':') && !licStr.startsWith('http')) {
                    let parts = licStr.split(':');
                    drmConfig = {
                        clearkey: { keyId: parts[0], key: parts[1] }
                    };
                } else {
                    // Widevine Format
                    let headers = [];
                    if (movie.token) headers.push({ name: "authorization", value: movie.token });
                    headers.push({ name: "Content-Type", value: "application/octet-stream" });

                    drmConfig = {
                        widevine: {
                            url: movie.lic,
                            headers: headers
                        }
                    };
                }
            }

            // Launch JW Player
            jwplayer("jw-player-container").setup({
                file: movie.mpd,
                drm: Object.keys(drmConfig).length > 0 ? drmConfig : undefined,
                width: "100%",
                height: "100%",
                autostart: true,
                stretching: "uniform",
                cast: {} // Enable Chromecast button
            });
        }
    </script>
</body>
</html>
